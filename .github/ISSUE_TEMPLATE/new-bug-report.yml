name: 🐞 Bug report 2
description: Create a report about something that is not working
labels: ["untriaged"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep in mind that the GitHub issue tracker is not intended as a
        general support forum, but for reporting **non-security** bugs and
        feature requests.

        If you're reporting the presence of a disclosed security vulnerability,
        such as a CVE reported in one of our container images, please follow our
        documented [guidance on vulnerability
        reporting](https://github.com/dotnet/dotnet-docker/blob/main/documentation/vulnerability-reporting.md).

        If you believe you have an issue that affects the security of .NET,
        please do NOT create an issue and instead email your issue details to
        secure@microsoft.com. Your report may be eligible for our [bug
        bounty](https://www.microsoft.com/en-us/msrc/bounty-dot-net-core) but
        ONLY if it is reported through email.

        For other types of questions, consider posting to
        [Discussions](https://github.com/dotnet/dotnet-docker/discussions) or
        [Stack Overflow](https://stackoverflow.com).

        ---
  - type: input
    id: image
    attributes:
      label: Which .NET image are you using?
      description: Please specify the exact digest if possible.
      placeholder: >-
        mcr.microsoft.com/dotnet/sdk:8.0@sha256:00ab6163f4c8fdf8ea427b1fa9d9d2312ff623d5810577ad73605a07ba67397a
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ---
        
        ## Steps to reproduce the bug

        Include minimal steps to reproduce the problem or point us to a simple
        repro project hosted in a GitHub repo. We may close this issue if:
        
        * We are not able to repro the behavior you're reporting
        * The repro project you share with us is too complex
        * The repro is in a file attachment such as a zip file
        
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce the bug.
      placeholder:

  - type: textarea
    id: other-information
    attributes:
      label: Other Information
      description: Any other information that you think is helpful
      placeholder: |
        * Include any relevant error messages
        * When does this issue occur? Does it occur consistently?
        * Do you know of any workarounds?
        * What host OS are you running the containers on?
  - type: textarea
    id: docker-version
    attributes:
      label: Output of `docker version`
      description: Paste the output of `docker version` here.
      render: console
  - type: textarea
    id: docker-info
    attributes:
      label: Output of `docker info`
      description: Paste the output of `docker info` here.
      render: console
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this!
